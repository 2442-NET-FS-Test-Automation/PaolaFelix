<!DOCTYPE html>
<html lang="en">
<head> <!--These are HTML Comments-->
    <!-- head contains metadata about the document
        things like language, charsets, etc. Doesn't render-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Library Catalog</title>
</head>
<body>
    <!-- Body contains the stuff that DOES render. Typically (alaways) within HTML elements-->
    <header class="site-header">
        <h1 id="heading">City Library</h1> <!--These are HTML elements-->
        <nav class="site-nav">
            <a href="index.html"> Catalog </a>
            <a href="login.html"> Sign in</a>
        </nav>
    </header>

    <main>
        <section id="catalog">
            <h2>Catalog</h2>

            <div class="toolbar">
                <!--Our first input - a placeholder for searching the catalog-->
                <label for="search">Search:</label>
                <input type="search" id="search" name="search" placeholder="title or SKU">
                <span class="hint">try a SKU like BK-101  </span>
            </div>

            <div class="cards" id="catalog-cards"
                <article class="card">
                    <h3>Clean Code</h3>
                    <d1>
                        <dt>SKU</dt><dd>BK-101</dd>
                        <dt>Price</dt><dd>29.99</dd>
                        <dt>In Stock</dt><dd>12</dd>
                    </d1>
                </article>
            
        </section>
    </main>

    <footer class="site-footer">
        <p>City Library</p>
    </footer>
</body>
</html>
